<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      window.onerror = function (message, source, lineno, colno, error) {
        alert(
          "Критическая ошибка скрипта: " + message + "\nВ файле: " + source
        );
        return false;
      };
      window.addEventListener("unhandledrejection", function (event) {
        alert("Необработанный промис: " + event.reason);
      });
    </script>

    <title>РостовСтат | Система управления медиафайлами</title>

    <meta
      name="description"
      content="Корпоративная CRM-система учета и стриминга аудиоданных для сотрудников РостовСтата"
    />
  </head>
  <body class="bg-slate-50">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
